<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Нет подключения — Dordoi Food</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --orange: #f97316;
      --amber: #f59e0b;
      --slate: #0f172a;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "SF Pro Display", "SF Pro Text", "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(ellipse at 14% 8%, rgba(254,215,170,0.52) 0%, transparent 38%),
        radial-gradient(ellipse at 88% 4%, rgba(216,180,254,0.30) 0%, transparent 32%),
        radial-gradient(ellipse at 50% 90%, rgba(186,230,253,0.25) 0%, transparent 45%),
        linear-gradient(160deg, #fdfcfb, #fffbf5 42%, #f8fafc);
      background-attachment: fixed;
      color: var(--slate);
    }

    @media (prefers-color-scheme: dark) {
      body {
        background:
          radial-gradient(ellipse at 14% 8%, rgba(120,60,10,0.30) 0%, transparent 38%),
          radial-gradient(ellipse at 88% 4%, rgba(80,40,120,0.18) 0%, transparent 32%),
          linear-gradient(160deg, #0f0e0c, #141210 42%, #0c1014);
        color: #f1ece4;
      }
      .card {
        background: rgba(25,23,20,0.72) !important;
        border-color: rgba(255,255,255,0.09) !important;
      }
      .hint { color: rgba(241,236,228,0.5) !important; }
    }

    .card {
      width: 100%;
      max-width: 340px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.88);
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 20px 55px rgba(15,23,42,0.13), 0 1.5px 0 rgba(255,255,255,0.95) inset, 0 0 0 0.5px rgba(255,255,255,0.55) inset;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset-inline: 0;
      top: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
    }

    .icon {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .hint {
      margin-top: 8px;
      font-size: 14px;
      color: rgba(15,23,42,0.55);
      line-height: 1.5;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 24px;
      width: 100%;
      height: 52px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--orange), var(--amber));
      color: white;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.01em;
      border: 1px solid rgba(249,115,22,0.25);
      box-shadow: 0 12px 28px rgba(249,115,22,0.38), 0 1px 0 rgba(255,255,255,0.22) inset;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:active {
      transform: scale(0.97);
      box-shadow: 0 6px 16px rgba(249,115,22,0.28);
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(249,115,22,0.4);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.85); }
      50% { opacity: 1; transform: scale(1.15); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Нет подключения</h1>
    <p class="hint">Проверьте интернет и попробуйте снова. Ваш заказ не потерян.</p>
    <button class="btn" onclick="location.reload()">Попробовать снова</button>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
